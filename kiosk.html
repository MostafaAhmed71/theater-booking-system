<!DOCTYPE html>
<html lang="ar" dir="rtl" class="page-kiosk">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no"
    />
    <meta name="theme-color" content="#06080f" />
    <link rel="icon" href="./assets/logo.jpeg" type="image/jpeg" />
    <title>أين مقعدي؟ — داخل المسرح</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./style.css?v=11" />
    <link rel="stylesheet" href="./seat.css?v=1" />
    <link rel="stylesheet" href="./kiosk.css?v=23" />
    <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
  </head>
  <body class="kiosk-body">
    <div class="kiosk-bg" aria-hidden="true"></div>

    <button
      type="button"
      class="kiosk-fs-btn"
      id="kiosk-fullscreen-btn"
      aria-label="ملء الشاشة"
      title="ملء الشاشة"
    >
      <svg
        class="kiosk-fs-btn__icon kiosk-fs-btn__icon--enter"
        viewBox="0 0 24 24"
        width="22"
        height="22"
        fill="none"
        stroke="currentColor"
        stroke-width="2"
        aria-hidden="true"
      >
        <path d="M4 9V4h5M20 9V4h-5M4 15v5h5M20 15v5h-5" />
      </svg>
      <svg
        class="kiosk-fs-btn__icon kiosk-fs-btn__icon--exit"
        viewBox="0 0 24 24"
        width="22"
        height="22"
        fill="none"
        stroke="currentColor"
        stroke-width="2"
        aria-hidden="true"
        hidden
      >
        <path d="M9 4H4v5M15 4h5v5M9 20H4v-5M15 20h5v-5" />
      </svg>
      <span class="kiosk-fs-btn__label">ملء الشاشة</span>
    </button>

    <div class="kiosk-shell" id="kiosk-shell">
      <!-- الصفحة الرئيسية -->
      <section class="kiosk-panel" id="kiosk-home">
        <header class="kiosk-hero">
          <img
            class="kiosk-logo"
            src="./assets/icon2.jpeg"
            alt="شعار المدرسة"
            width="158"
            height="158"
          />
          <p class="kiosk-school" id="kiosk-school-name">ثانوية نخبة الشمال</p>
          <h1 class="kiosk-title">أين مقعدي؟</h1>
        </header>

        <div class="kiosk-home-card">
          <p class="kiosk-lead">
            امسح رمز QR من رسالة واتساب، أو أدخل رمز الدعوة (4 أرقام)
          </p>

          <div class="kiosk-choice-grid">
          <button type="button" class="kiosk-choice" id="kiosk-go-scan">
            <span class="kiosk-choice-icon" aria-hidden="true">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M4 7V4h3M20 7V4h-3M4 17v3h3M20 17v3h-3" />
                <rect x="7" y="7" width="10" height="10" rx="1.5" />
              </svg>
            </span>
            <span class="kiosk-choice-label">مسح رمز QR</span>
            <span class="kiosk-choice-desc">من رسالة واتساب</span>
          </button>
          <button type="button" class="kiosk-choice" id="kiosk-go-code">
            <span class="kiosk-choice-icon kiosk-choice-icon--gold" aria-hidden="true">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <rect x="3" y="5" width="18" height="14" rx="2" />
                <path d="M7 12h2M11 12h2M15 12h2M7 9h10" />
              </svg>
            </span>
            <span class="kiosk-choice-label">إدخال الرمز</span>
            <span class="kiosk-choice-desc">4 أرقام</span>
          </button>
          </div>

          <footer class="kiosk-footnote kiosk-dev" id="kiosk-home-footnote" aria-label="معلومات المطور"></footer>
        </div>
      </section>

      <!-- إدخال الرمز -->
      <section class="kiosk-panel kiosk-panel--fullscreen" id="kiosk-code-panel" hidden>
        <header class="kiosk-topbar">
          <button type="button" class="kiosk-back" id="kiosk-code-back" aria-label="رجوع">
            <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2.5">
              <path d="M14 6l-6 6 6 6" />
            </svg>
            رجوع
          </button>
          <h2 class="kiosk-topbar-title">رمز الدعوة</h2>
        </header>

        <div class="kiosk-code-slots" dir="ltr" aria-label="رمز الدعوة">
          <div class="kiosk-slot" data-slot="0"><span class="kiosk-slot-char">·</span></div>
          <div class="kiosk-slot" data-slot="1"><span class="kiosk-slot-char">·</span></div>
          <div class="kiosk-slot" data-slot="2"><span class="kiosk-slot-char">·</span></div>
          <div class="kiosk-slot" data-slot="3"><span class="kiosk-slot-char">·</span></div>
        </div>
        <input
          class="kiosk-code-input-visually-hidden"
          id="kiosk-code-input"
          type="tel"
          inputmode="numeric"
          maxlength="4"
          autocomplete="off"
          autocapitalize="off"
          spellcheck="false"
          tabindex="-1"
          aria-hidden="true"
        />

        <div class="kiosk-pad-section kiosk-pad-section--numpad">
          <p class="kiosk-pad-label">أدخل 4 أرقام</p>
          <div class="kiosk-numpad" id="kiosk-digit-pad"></div>
        </div>

        <p class="kiosk-msg kiosk-msg--error" id="kiosk-code-error" role="alert" hidden></p>

        <div class="kiosk-sticky-cta">
          <button type="button" class="kiosk-cta" id="kiosk-code-submit">عرض مقعدي</button>
        </div>
      </section>

      <!-- مسح QR -->
      <section class="kiosk-panel" id="kiosk-scan-panel" hidden>
        <header class="kiosk-topbar">
          <button type="button" class="kiosk-back" id="kiosk-scan-back" aria-label="رجوع">
            <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2.5">
              <path d="M14 6l-6 6 6 6" />
            </svg>
            رجوع
          </button>
          <h2 class="kiosk-topbar-title">مسح رمز QR</h2>
        </header>

        <div class="kiosk-scanner">
          <div class="kiosk-scanner-frame">
            <div id="kiosk-reader" class="kiosk-reader"></div>
            <div class="kiosk-scanner-corners" aria-hidden="true"></div>
          </div>
          <p class="kiosk-scan-status" id="kiosk-scan-status">جاري تشغيل الكاميرا…</p>
        </div>
        <p class="kiosk-msg kiosk-msg--error" id="kiosk-scan-error" role="alert" hidden></p>
      </section>
    </div>

    <div class="kiosk-loading" id="kiosk-loading" hidden>
      <div class="kiosk-spinner" aria-hidden="true"></div>
      <p>جاري البحث عن مقعدك…</p>
    </div>

    <div class="kiosk-toast" id="kiosk-result-gate" hidden>
      <p id="kiosk-result-err" role="alert"></p>
    </div>

    <div
      id="pano-stage"
      class="pano-stage pano-stage--explore kiosk-pano"
      hidden
      aria-label="موقع المقعد على البانوراما"
    >
      <div class="pano-inner" id="pano-inner">
        <picture>
          <source
            srcset="./assets/theater-mobile.webp"
            media="(max-width: 900px)"
            type="image/webp"
          />
          <source
            srcset="./assets/theater-mobile.jpg"
            media="(max-width: 900px)"
            type="image/jpeg"
          />
          <source srcset="./assets/theater.webp" type="image/webp" />
          <img
            id="pano-img"
            class="pano-img"
            src="./assets/theater.jpg"
            alt="بانوراما المسرح"
            decoding="async"
            draggable="false"
          />
        </picture>
        <div id="pano-pins-root" class="pano-pins-root" aria-hidden="true"></div>
      </div>
    </div>

    <aside class="kiosk-bottom-bar" id="kiosk-seat-bar" hidden aria-label="بيانات الحجز">
      <div class="kiosk-bottom-bar__inner">
        <div class="kiosk-bottom-bar__info">
          <span class="kiosk-result-badge" id="kiosk-result-badge">مقعدك</span>
          <div class="kiosk-bottom-bar__seats">
            <p class="kiosk-result-seat" id="kiosk-result-seat"></p>
            <p class="kiosk-result-companion" id="kiosk-result-companion" hidden></p>
          </div>
          <p class="kiosk-result-name" id="kiosk-result-name"></p>
          <p class="kiosk-result-code" id="kiosk-result-code" dir="ltr"></p>
        </div>
        <div class="kiosk-bottom-bar__actions">
          <button type="button" class="kiosk-cta kiosk-cta--ghost kiosk-cta--compact" id="seat-view-focus">
            <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2">
              <circle cx="11" cy="11" r="7" />
              <path d="M21 21l-4.35-4.35M11 8v6M8 11h6" />
            </svg>
            تكبير
          </button>
          <button type="button" class="kiosk-cta kiosk-cta--compact" id="kiosk-new-lookup">استعلام جديد</button>
        </div>
      </div>
    </aside>

    <div class="kiosk-seat-legend" id="kiosk-seat-legend" hidden aria-label="دليل ألوان المقاعد">
      <p class="kiosk-seat-legend__title">دليل الألوان</p>
      <ul class="kiosk-seat-legend__list">
        <li class="kiosk-seat-legend__item kiosk-seat-legend__item--student">
          <span class="kiosk-seat-legend__dot" aria-hidden="true"></span>
          <span>أحمر — مقعد الطالب (الخريج)</span>
        </li>
        <li class="kiosk-seat-legend__item kiosk-seat-legend__item--companion">
          <span class="kiosk-seat-legend__dot" aria-hidden="true"></span>
          <span>أخضر — مقعد المرافق</span>
        </li>
      </ul>
    </div>

    <p class="kiosk-pano-hint" id="kiosk-pano-hint" hidden aria-hidden="true">
      اسحب للتحريك · قرصة للتكبير
    </p>

    <script defer src="./threa-config.js?v=11"></script>
    <script defer src="./invite-codes.js?v=2"></script>
    <script defer src="./theater-pano-url.js"></script>
    <script defer src="./seats-data.js?v=5"></script>
    <script defer src="./booking-policy.js?v=1"></script>
    <script type="module" src="./supabase-init.js"></script>
    <script defer src="./guest-quota.js?v=6"></script>
    <script defer src="./panorama-storage.js"></script>
    <script defer src="./panorama-path.js"></script>
    <script defer src="./guest-assignments.js?v=8"></script>
    <script defer src="./kiosk.js?v=17"></script>
  </body>
</html>
