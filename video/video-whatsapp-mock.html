<!DOCTYPE html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>واتساب — عرض توضيحي</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;600;700&display=swap"
      rel="stylesheet"
    />
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
      }
      body {
        min-height: 100vh;
        font-family: Tajawal, sans-serif;
        background: #0b141a;
        color: #e9edef;
        display: flex;
        flex-direction: column;
      }
      .top {
        padding: 0.85rem 1rem;
        background: #1f2c34;
        display: flex;
        align-items: center;
        gap: 0.75rem;
        border-bottom: 1px solid #2a3942;
      }
      .avatar {
        width: 42px;
        height: 42px;
        border-radius: 50%;
        background: #c9a227;
        display: grid;
        place-items: center;
        font-weight: 700;
        font-size: 0.85rem;
        color: #1a1200;
      }
      .chat {
        flex: 1;
        padding: 1.25rem 1rem 2rem;
        background: url("data:image/svg+xml,%3Csvg width='60' height='60' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M0 0h60v60H0z' fill='%230b141a'/%3E%3Cpath d='M0 30h60M30 0v60' stroke='%23121d24' stroke-width='0.5'/%3E%3C/svg%3E");
      }
      .bubble {
        max-width: 92%;
        margin-right: auto;
        background: #1f2c34;
        border-radius: 12px 12px 4px 12px;
        padding: 1rem 1.1rem;
        line-height: 1.65;
        font-size: 0.98rem;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.25);
      }
      .bubble strong {
        color: #c9a227;
      }
      .qr-box {
        margin-top: 0.85rem;
        height: 140px;
        border-radius: 10px;
        background: linear-gradient(135deg, #fff 0%, #f0f0f0 100%);
        display: grid;
        place-items: center;
        color: #333;
        font-size: 0.8rem;
        border: 2px dashed #c9a227;
      }
      .cta {
        display: inline-block;
        margin-top: 0.85rem;
        padding: 0.55rem 1rem;
        background: #00a884;
        color: #fff;
        border-radius: 8px;
        font-weight: 700;
        font-size: 0.95rem;
      }
      .time {
        text-align: left;
        font-size: 0.72rem;
        color: #8696a0;
        margin-top: 0.35rem;
      }
      .hint {
        text-align: center;
        padding: 0.75rem;
        color: #8696a0;
        font-size: 0.85rem;
        background: #111b21;
      }
    </style>
  </head>
  <body>
    <header class="top">
      <div class="avatar">ثريا</div>
      <div>
        <div style="font-weight: 700">حجز حفل التخرج</div>
        <div style="font-size: 0.8rem; color: #8696a0">رسالة دعوة</div>
      </div>
    </header>
    <main class="chat">
      <div class="bubble">
        مرحباً <strong>أحمد</strong>، تم تأكيد حجزك لحفل التخرج.<br />
        رمز الدعوة: <strong dir="ltr">0347</strong>
        <div class="qr-box">رمز QR — امسحه عند الدخول</div>
        <span class="cta">عرض مقعدك على الخريطة</span>
        <div class="time">7:02 م ✓✓</div>
      </div>
    </main>
    <p class="hint">عرض توضيحي — ليس رسالة حقيقية</p>
  </body>
</html>
