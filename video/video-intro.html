<!DOCTYPE html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>مقدمة — أين مقعدي؟</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Tajawal:wght@500;700;800&display=swap"
      rel="stylesheet"
    />
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
      }
      body {
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 1.25rem;
        padding: 2rem;
        font-family: Tajawal, sans-serif;
        background: radial-gradient(ellipse at 50% 20%, #1a2540 0%, #06080f 55%);
        color: #f4f6fb;
        text-align: center;
      }
      .logo {
        width: 120px;
        height: 120px;
        border-radius: 24px;
        object-fit: cover;
        box-shadow: 0 12px 40px rgba(0, 0, 0, 0.45);
      }
      .school {
        font-size: 1.05rem;
        color: #c9a227;
        font-weight: 600;
      }
      h1 {
        font-size: clamp(1.8rem, 5vw, 2.6rem);
        font-weight: 800;
        line-height: 1.35;
      }
      .sub {
        font-size: 1.15rem;
        color: #a8b4d0;
        max-width: 28rem;
        line-height: 1.6;
      }
      .tags {
        display: flex;
        flex-wrap: wrap;
        gap: 0.6rem;
        justify-content: center;
        margin-top: 0.5rem;
      }
      .tag {
        padding: 0.45rem 1rem;
        border-radius: 999px;
        background: rgba(201, 162, 39, 0.15);
        border: 1px solid rgba(201, 162, 39, 0.35);
        font-size: 0.95rem;
      }
    </style>
  </head>
  <body>
    <img class="logo" src="../assets/icon2.jpeg" alt="شعار المدرسة" />
    <p class="school">ثانوية نخبة الشمال الأهلية — الدفعة الخامسة</p>
    <h1>أين مقعدي؟</h1>
    <p class="sub">دليل سريع لمعرفة مقعدك في حفل التخرج</p>
    <div class="tags">
      <span class="tag">من الجوال</span>
      <span class="tag">داخل المسرح</span>
    </div>
  </body>
</html>
